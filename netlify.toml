[build]
  command = "# static site, no build step"
  functions = "netlify/functions"
  publish = "."

[[redirects]]
  from = "/api/fetch-article"
  to = "/.netlify/functions/fetch-article"
  status = 200

[[redirects]]
  from = "/api/increment-counter"
  to = "/.netlify/functions/increment-counter"
  status = 200
